<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escolar - Estudiantes y Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--background); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; color: var(--primary); }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 24px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; background: var(--surface); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }

        /* Tablas */
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; }
        
        /* Sección Asistencia y QR */
        .attendance-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .attendance-layout { grid-template-columns: 1fr; } }
        #reader { width: 100%; background: #000; border-radius: 12px; overflow: hidden; min-height: 250px; }
        
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .actions-btns { display: flex; gap: 5px; }
        .actions-btns .btn { padding: 6px 12px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1><i class="fa-solid fa-graduation-cap"></i> Sistema de Gestión Escolar</h1>
            <p style="font-size: 14px; color: #64748b;">Control de Estudiantes y Asistencia QR</p>
        </div>
        <button class="btn btn-success" onclick="exportarBackup()"><i class="fa-solid fa-download"></i> Exportar Backup (JS)</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('estudiantes')"><i class="fa-solid fa-users"></i> Estudiantes</button>
        <button class="tab-btn" onclick="switchTab('asistencia')"><i class="fa-solid fa-qrcode"></i> Control de Asistencia</button>
    </div>

    <div id="estudiantes" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Listado de Estudiantes</h3>
            <button class="btn btn-primary" onclick="modalEstudiante()"><i class="fa-solid fa-plus"></i> Nuevo Estudiante</button>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>DNI / RUT</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Género</th>
                        <th>Edad</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEstudiantes"></tbody>
            </table>
        </div>
    </div>

    <div id="asistencia" class="tab-content">
        <div class="attendance-layout">
            <div>
                <h3 style="margin-bottom: 15px;"><i class="fa-solid fa-camera"></i> Escáner de Asistencia QR</h3>
                <div style="margin-bottom: 15px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="iniciarCamara()"><i class="fa-solid fa-video"></i> Abrir Cámara Móvil</button>
                    <button class="btn btn-warning" onclick="modalAsistenciaManual()"><i class="fa-solid fa-pen-to-square"></i> Registro Manual</button>
                </div>
                <div id="reader"></div>
            </div>
            
            <div>
                <div class="calendar-header">
                    <h3><i class="fa-solid fa-calendar-days"></i> Control de Asistencia del Día</h3>
                    <input type="date" id="fechaAsistencia" class="btn" style="background: white; border: 1px solid var(--border); color: black;" onchange="renderAsistencias()">
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Estudiante</th>
                                <th>Hora</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAsistencias"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    // Inicialización de los 20 registros requeridos
    let estudiantes = [
        { dni: "10248593-K", nombres: "Mateo Alejandro", apellidos: "Silva Rojas", genero: "Masculino", edad: 19, telefono: "+56 9 8765 4321" },
        { dni: "45896231-7", nombres: "Valentina Paz", apellidos: "Morales Castro", genero: "Femenino", edad: 21, telefono: "+56 9 7654 3210" },
        { dni: "70214589-4", nombres: "Lucas Ignacio", apellidos: "Herrera Fuentealba", genero: "Masculino", edad: 23, telefono: "+56 9 6543 2109" },
        { dni: "18563247-2", nombres: "Sofía Antonella", apellidos: "Tapia Muñoz", genero: "Femenino", edad: 18, telefono: "+56 9 5432 1098" },
        { dni: "12458963-5", nombres: "Benjamin Alexis", apellidos: "Contreras Sepúlveda", genero: "Masculino", edad: 22, telefono: "+56 9 4321 0987" },
        { dni: "20145896-8", nombres: "Camila Belén", apellidos: "Carrasco Vidal", genero: "Femenino", edad: 20, telefono: "+56 9 3210 9876" },
        { dni: "09563214-K", nombres: "Joaquín Andrés", apellidos: "Vergara Soto", genero: "Masculino", edad: 25, telefono: "+56 9 2109 8765" },
        { dni: "15896472-3", nombres: "Isabella Ignacia", apellidos: "Sanhueza Pinto", genero: "Femenino", edad: 19, telefono: "+56 9 1098 7654" },
        { dni: "22415863-1", nombres: "Tomás Eduardo", apellidos: "Fuentes Flores", genero: "Masculino", edad: 22, telefono: "+56 9 9876 5432" },
        { dni: "11458962-6", nombres: "Gabriela Andrea", apellidos: "Reyes Gutiérrez", genero: "Femenino", edad: 24, telefono: "+56 9 8765 1234" },
        { dni: "08963241-7", nombres: "Matías Nicolás", apellidos: "Valenzuela Campos", genero: "Masculino", edad: 21, telefono: "+56 9 7654 2345" },
        { dni: "17452369-9", nombres: "Florencia Dominga", apellidos: "Muñoz Araya", genero: "Femenino", edad: 18, telefono: "+56 9 6543 3456" },
        { dni: "13698521-4", nombres: "Samuel Esteban", apellidos: "Espinoza Henríquez", genero: "Masculino", edad: 20, telefono: "+56 9 5432 4567" },
        { dni: "19852364-0", nombres: "Martina Isidora", apellidos: "Cáceres Díaz", genero: "Femenino", edad: 23, telefono: "+56 9 4321 5678" },
        { dni: "05632147-8", nombres: "Nicolás Alonso", apellidos: "Vera Oyarzún", genero: "Masculino", edad: 26, telefono: "+56 9 3210 6789" },
        { dni: "14253698-2", nombres: "Emilia Pascal", apellidos: "Olivares Soto", genero: "Femenino", edad: 19, telefono: "+56 9 2109 7890" },
        { dni: "21458963-K", nombres: "Diego Armando", administración: "", apellidos: "Mardones Jara", genero: "Masculino", edad: 22, telefono: "+56 9 1098 8901" },
        { dni: "16985214-5", nombres: "Antonella Rocío", apellidos: "Poblete Burgos", genero: "Femenino", edad: 20, telefono: "+56 9 9876 9012" },
        { dni: "23654128-3", nombres: "Sebastián Omar", apellidos: "Bravo Mellado", genero: "Masculino", edad: 24, telefono: "+56 9 8765 0123" },
        { dni: "11258963-1", nombres: "Francisca Javiera", apellidos: "Salazar Donoso", genero: "Femenino", edad: 21, telefono: "+56 9 7654 1234" }
    ];

    let asistencias = []; // Formato: { fecha: 'YYYY-MM-DD', dni: '...', hora: '...', estado: 'Presente/Tarde' }
    let html5QrcodeScanner = null;

    // Configuración Inicial
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('fechaAsistencia').value = new Date().toISOString().split('T')[0];
        renderEstudiantes();
        renderAsistencias();
    });

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId !== 'asistencia' && html5QrcodeScanner) {
            html5QrcodeScanner.clear();
        }
    }

    // --- CRUD ESTUDIANTES ---
    function renderEstudiantes() {
        const tbody = document.getElementById('tablaEstudiantes');
        tbody.innerHTML = '';
        estudiantes.forEach((est, index) => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${est.dni}</strong></td>
                    <td>${est.nombres}</td>
                    <td>${est.apellidos}</td>
                    <td>${est.genero}</td>
                    <td>${est.edad}</td>
                    <td>${est.telefono}</td>
                    <td class="actions-btns">
                        <button class="btn btn-warning" onclick="modalEstudiante(${index})"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn btn-danger" onclick="eliminarEstudiante(${index})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    async function modalEstudiante(index = null) {
        const est = index !== null ? estudiantes[index] : { dni:'', nombres:'', apellidos:'', genero:'Masculino', edad:'', telefono:'' };
        const titulo = index !== null ? 'Editar Estudiante' : 'Registrar Estudiante';

        const { value: formValues } = await Swal.fire({
            title: titulo,
            html: `
                <input id="swal-dni" class="swal2-input" placeholder="DNI / RUT" value="${est.dni}" ${index !== null ? 'disabled' : ''}>
                <input id="swal-nombres" class="swal2-input" placeholder="Nombres" value="${est.nombres}">
                <input id="swal-apellidos" class="swal2-input" placeholder="Apellidos" value="${est.apellidos}">
                <select id="swal-genero" class="swal2-input">
                    <option value="Masculino" ${est.genero === 'Masculino' ? 'selected' : ''}>Masculino</option>
                    <option value="Femenino" ${est.genero === 'Femenino' ? 'selected' : ''}>Femenino</option>
                </select>
                <input id="swal-edad" type="number" class="swal2-input" placeholder="Edad" value="${est.edad}">
                <input id="swal-telefono" class="swal2-input" placeholder="Teléfono" value="${est.telefono}">
            `,
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: 'Guardar',
            cancelButtonText: 'Cancelar',
            preConfirm: () => {
                const dni = document.getElementById('swal-dni').value.trim();
                const nombres = document.getElementById('swal-nombres').value.trim();
                const apellidos = document.getElementById('swal-apellidos').value.trim();
                const genero = document.getElementById('swal-genero').value;
                const edad = document.getElementById('swal-edad').value;
                const telefono = document.getElementById('swal-telefono').value.trim();

                if (!dni || !nombres || !apellidos || !edad || !telefono) {
                    Swal.showValidationMessage('Por favor rellena todos los campos');
                    return false;
                }
                return { dni, nombres, apellidos, genero, edad: parseInt(edad), telefono };
            }
        });

        if (formValues) {
            if (index !== null) {
                estudiantes[index] = formValues;
                Swal.fire('¡Actualizado!', 'Datos modificados correctamente.', 'success');
            } else {
                if (estudiantes.some(e => e.dni === formValues.dni)) {
                    Swal.fire('Error', 'El DNI ingresado ya existe.', 'error');
                    return;
                }
                estudiantes.push(formValues);
                Swal.fire('¡Registrado!', 'Estudiante añadido.', 'success');
            }
            renderEstudiantes();
        }
    }

    function eliminarEstudiante(index) {
        Swal.fire({
            title: '¿Estás seguro?',
            text: `Eliminarás a ${estudiantes[index].nombres} de los registros.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                estudiantes.splice(index, 1);
                renderEstudiantes();
                Swal.fire('Eliminado', 'El estudiante ha sido removido.', 'success');
            }
        });
    }

    // --- LOGICA DE ASISTENCIA ---
    function renderAsistencias() {
        const fechaSel = document.getElementById('fechaAsistencia').value;
        const tbody = document.getElementById('tablaAsistencias');
        tbody.innerHTML = '';

        const filtradas = asistencias.filter(a => a.fecha === fechaSel);

        if(filtradas.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#94a3b8;">No hay asistencias registradas para esta fecha.</td></tr>`;
            return;
        }

        filtradas.forEach((asist, index) => {
            const est = estudiantes.find(e => e.dni === asist.dni);
            const nombreCompleto = est ? `${est.nombres} ${est.apellidos}` : 'Estudiante no registrado';
            const badgeColor = asist.estado === 'Presente' ? 'var(--success)' : 'var(--warning)';
            
            // Buscamos el index global real en el array original para poder operar sobre él
            const globalIndex = asistencias.indexOf(asist);

            tbody.innerHTML += `
                <tr>
                    <td>${nombreCompleto}<br><small style="color:#64748b;">${asist.dni}</small></td>
                    <td>${asist.hora}</td>
                    <td><span style="background:${badgeColor}; color:white; padding:3px 8px; border-radius:5px; font-size:12px;">${asist.estado}</span></td>
                    <td>
                        <button class="btn btn-warning" style="padding:4px 8px;" onclick="editarAsistencia(${globalIndex})"><i class="fa-solid fa-marker"></i></button>
                        <button class="btn btn-danger" style="padding:4px 8px;" onclick="eliminarAsistencia(${globalIndex})"><i class="fa-solid fa-trash-can"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    function registrarAsistenciaProcesada(dni, estadoDefecto = 'Presente') {
        const estudianteExiste = estudiantes.find(e => e.dni === dni);
        if (!estudianteExiste) {
            Swal.fire('Código Desconocido', `El DNI ${dni} no pertenece a ningún estudiante matriculado.`, 'error');
            return;
        }

        const fechaHoy = new Date().toISOString().split('T')[0];
        const yaAsistio = asistencias.some(a => a.fecha === fechaHoy && a.dni === dni);

        if (yaAsistio) {
            Swal.fire('Ya Registrado', `${estudianteExiste.nombres} ya cuenta con asistencia hoy.`, 'info');
            return;
        }

        const ahora = new Date();
        const horaStr = ahora.toTimeString().split(' ')[0].substring(0,5);

        asistencias.push({
            fecha: fechaHoy,
            dni: dni,
            hora: horaStr,
            estado: estadoDefecto
        });

        document.getElementById('fechaAsistencia').value = fechaHoy; // Mover calendario a hoy
        renderAsistencias();

        Swal.fire({
            title: 'Asistencia Guardada',
            text: `${estudianteExiste.nombres} ${estudianteExiste.apellidos} registrado como ${estadoDefecto}`,
            icon: 'success',
            timer: 2000,
            showConfirmButton: false
        });
    }

    // Formularios Interactivos de Asistencia (Manual/Edición/Eliminación)
    async function modalAsistenciaManual() {
        let opcionesEstudiantes = estudiantes.map(e => `<option value="${e.dni}">${e.nombres} ${e.apellidos} (${e.dni})</option>`).join('');
        
        const { value: formValues } = await Swal.fire({
            title: 'Asistencia Manual',
            html: `
                <select id="asist-dni" class="swal2-input">${opcionesEstudiantes}</select>
                <select id="asist-estado" class="swal2-input">
                    <option value="Presente">Presente</option>
                    <option value="Tarde">Tarde</option>
                </select>
            `,
            showCancelButton: true,
            confirmButtonText: 'Registrar'
        });

        if(formValues) {
            const dni = document.getElementById('asist-dni').value;
            const estado = document.getElementById('asist-estado').value;
            registrarAsistenciaProcesada(dni, estado);
        }
    }

    async function editarAsistencia(globalIndex) {
        const asist = asistencias[globalIndex];
        const { value: nuevoEstado } = await Swal.fire({
            title: 'Modificar Asistencia',
            input: 'select',
            inputOptions: { 'Presente': 'Presente', 'Tarde': 'Tarde' },
            inputValue: asist.estado,
            showCancelButton: true,
            confirmButtonText: 'Actualizar'
        });

        if(nuevoEstado) {
            asistencias[globalIndex].estado = nuevoEstado;
            renderAsistencias();
            Swal.fire('Modificado', 'El estado ha sido actualizado.', 'success');
        }
    }

    function eliminarAsistencia(globalIndex) {
        Swal.fire({
            title: '¿Eliminar registro?',
            text: "Se borrará la marca de asistencia de este estudiante para este día.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            confirmButtonText: 'Eliminar'
        }).then((result) => {
            if (result.isConfirmed) {
                asistencias.splice(globalIndex, 1);
                renderAsistencias();
                Swal.fire('Eliminado', 'La asistencia fue borrada.', 'success');
            }
        });
    }

    // --- INTEGRACIÓN CÁMARA / LECTOR QR ---
    function iniciarCamara() {
        // En móviles, preferirá de manera automática la cámara trasera ('environment')
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        });
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
        // Detiene el escáner tras una lectura exitosa
        html5QrcodeScanner.clear();
        // El texto decodificado del QR debe corresponder al DNI/RUT exacto del alumno
        registrarAsistenciaProcesada(decodedText.trim());
    }

    function onScanFailure(error) {
        // Error de escaneo continuo pasivo; se omite para evitar spam en consola.
    }

    // --- BACKUP EXPORTABLE ---
    function exportarBackup() {
        const datosBackup = {
            fechaCopia: new Date().toISOString(),
            estudiantes: estudiantes,
            asistencias: asistencias
        };

        const contenidoArchivo = `// BACKUP SISTEMA ESCOLAR\nconst backupEscolar = ${JSON.stringify(datosBackup, null, 4)};`;
        
        const blob = new Blob([contenidoArchivo], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        a.href = url;
        a.download = `backup_escolar_${new Date().toISOString().split('T')[0]}.js`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        Swal.fire('Backup Exitoso', 'Se ha descargado el archivo JS de respaldo.', 'success');
    }
</script>

</body>
</html>
