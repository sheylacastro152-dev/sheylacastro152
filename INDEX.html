<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Sistema Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #f0f2f5;">

    <h2>Estudiantes (Prototipo Corto)</h2>
    <button onclick="exportarJS()" style="background: green; color: white; padding: 10px;">Exportar Backup JS</button>
    <ul id="lista"></ul>

    <script>
        let alumnos = [
            {dni:"10248593-K", nombre:"Mateo Silva"}, {dni:"45896231-7", nombre:"Valentina Morales"},
            {dni:"70214589-4", nombre:"Lucas Herrera"}, {dni:"18563247-2", nombre:"Sofía Tapia"},
            {dni:"12458963-5", nombre:"Benjamin Contreras"}, {dni:"20145896-8", nombre:"Camila Carrasco"},
            {dni:"09563214-K", nombre:"Joaquín Vergara"}, {dni:"15896472-3", nombre:"Isabella Sanhueza"},
            {dni:"22415863-1", nombre:"Tomás Fuentes"}, {dni:"11458962-6", nombre:"Gabriela Reyes"},
            {dni:"08963241-7", nombre:"Matías Valenzuela"}, {dni:"17452369-9", nombre:"Florencia Muñoz"},
            {dni:"13698521-4", nombre:"Samuel Espinoza"}, {dni:"19852364-0", nombre:"Martina Cáceres"},
            {dni:"05632147-8", nombre:"Nicolás Vera"}, {dni:"14253698-2", nombre:"Emilia Olivares"},
            {dni:"21458963-K", nombre:"Diego Mardones"}, {dni:"16985214-5", nombre:"Antonella Poblete"},
            {dni:"23654128-3", nombre:"Sebastián Bravo"}, {dni:"11258963-1", nombre:"Francisca Salazar"}
        ];

        function pintar() {
            const l = document.getElementById("lista"); l.innerHTML = "";
            alumnos.forEach((a, i) => {
                l.innerHTML += `<li>${a.dni} - ${a.nombre} 
                    <button onclick="editar(${i})">Editar</button>
                    <button onclick="borrar(${i})">X</button>
                </li>`;
            });
        }

        async function editar(i) {
            const { value: n } = await Swal.fire({ title:'Editar', input:'text', inputValue:alumnos[i].nombre });
            if(n) { alumnos[i].nombre = n; pintar(); }
        }

        function borrar(i) {
            Swal.fire({ title:'¿Borrar?', showCancelButton:true }).then(r => { if(r.isConfirmed) { alumnos.splice(i,1); pintar(); } });
        }

        function exportarJS() {
            let blob = new Blob([`const backup = ${JSON.stringify(alumnos)};`], {type:'text/javascript'});
            let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='backup.js'; a.click();
        }

        pintar();
    </script>
</body>
</html>
